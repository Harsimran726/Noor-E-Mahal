<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Noor E Mahal</title>
    <link rel="icon" href="{{ url_for('static', path='Noor_e_mahal_ png (6).png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <style>
        /* --- Gallery Hero Slider --- */
        .gallery-slider {
            position: relative;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 4s linear;
            transform: scale(1.05);
            /* Slight zoom out effect during slide */
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .slide-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background-position: center;
            /* Parallax effect on scroll via JS, but object-fit handles the image nicely */
        }

        .gallery-slider::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(253, 248, 239, 0.2), rgba(107, 15, 26, 0.6));
            z-index: 2;
        }

        .gallery-slider h1 {
            position: relative;
            z-index: 3;
            font-family: var(--font-heading);
            font-size: 3.5rem;
            color: var(--cream);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            animation: fadeInDown 1.2s ease forwards;
        }

        /* Slider Controls */
        .slider-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            display: flex;
            gap: 12px;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(253, 248, 239, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .slider-dot.active {
            background: var(--gold);
            transform: scale(1.3);
            border-color: var(--white);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Filter Bar --- */
        .filter-bar {
            background: var(--cream);
            padding: 24px 0;
            border-bottom: 1px solid rgba(197, 163, 85, 0.2);
            position: sticky;
            top: 70px;
            z-index: 50;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        .filter-bar .container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .filter-btn {
            font-family: var(--font-ui);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 24px;
            border: 1px solid rgba(197, 163, 85, 0.4);
            background: transparent;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 30px;
            /* More premium pill shape */
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--maroon-deep);
            color: var(--cream);
            border-color: var(--maroon-deep);
            box-shadow: 0 6px 15px rgba(107, 15, 26, 0.2);
            transform: translateY(-2px);
        }

        /* --- Premium Grid Layout --- */
        .gallery-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 24px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: 450px;
            /* Taller images */
            gap: 20px;
            perspective: 1200px;
            /* For 3D transforms */
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 350px;
            }
        }

        /* 1, 2, 1, 2, 2 Pattern applied via nth-child (every 8 items repeat) 
           Row 1: 1 item (spans 2)
           Row 2: 2 items (span 1 each)
           Row 3: 1 item (spans 2)
           Row 4: 2 items (span 1 each)
           Row 5: 2 items (span 1 each)
        */
        @media (min-width: 769px) {

            .gallery-item:nth-child(8n + 1),
            .gallery-item:nth-child(8n + 4) {
                grid-column: span 2;
                grid-row: span 1;
                /* Makes wide panoramic landscape shots */
            }
        }

        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            /* Transform-style for 3D children */
            transform-style: preserve-3d;
            /* Will handle tilt in JS */
        }

        /* Inner Wrapper for Parallax & Zoom */
        .gallery-item-inner {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .gallery-item:hover img {
            transform: scale(1.08) translateZ(20px);
            /* 3D pop effect */
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0) 50%);
            opacity: 0.6;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .gallery-item:hover::after {
            opacity: 0.8;
        }

        .img-label {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            font-family: var(--font-heading);
            font-size: 1.4rem;
            color: var(--cream);
            letter-spacing: 2px;
            transform: translateY(30px) translateZ(40px);
            /* 3D translation */
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .gallery-item:hover .img-label {
            transform: translateY(0) translateZ(40px);
            opacity: 1;
        }

        .gallery-item[data-hidden="true"] {
            display: none !important;
        }
    </style>
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container">
            <a href="/" class="nav-brand">
                <img src="{{ url_for('static', path='Noor_e_mahal_ png (6).png') }}" alt="Logo" class="nav-logo">
                <div class="nav-brand-text">Noor E Mahal <span>Story Begins in Royal Palace</span></div>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="/">Home</a></li>
                <li class="nav-separator">|</li>
                <li><a href="/gallery" class="active">Gallery</a></li>
                <li class="nav-separator">|</li>
                <li><a href="/about">About Us</a></li>
                <li class="nav-separator">|</li>
                <li><a href="/facilities">Facilities</a></li>
                <li><a href="/contact" class="nav-cta">Contact</a></li>
            </ul>
            <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <!-- Hero Slider -->
    <section class="gallery-slider" id="gallerySlider">
        <div class="slide active">
            <img src="{{ url_for('static', path='Noor_e_mahal_ png (1).png') }}" class="slide-bg parallax-bg"
                alt="Gallery Hero 1">
        </div>
        <div class="slide">
            <img src="{{ url_for('static', path='Noor_e_mahal_ png (5).png') }}" class="slide-bg parallax-bg"
                alt="Gallery Hero 2">
        </div>

        <h1 class="parallax-text">Our Grandeur</h1>

        <div class="slider-nav">
            <div class="slider-dot active" data-index="0"></div>
            <div class="slider-dot" data-index="1"></div>
        </div>
    </section>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="container">
            <button class="filter-btn active" data-cat="all">All</button>
            <button class="filter-btn" data-cat="gallery_outside">Exterior</button>
            <button class="filter-btn" data-cat="gallery_inside">Interior</button>
            <button class="filter-btn" data-cat="gallery_hall">Grand Hall</button>
            <button class="filter-btn" data-cat="gallery_garden">Gardens</button>
            <button class="filter-btn" data-cat="gallery_rooms">Royal Suites</button>
            <button class="filter-btn" data-cat="gallery_parking">Facilities</button>
        </div>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="galleryGrid">
        {% for img in images %}
        <div class="gallery-item tilt-card" data-category="{{ img.category }}">
            <div class="gallery-item-inner">
                <img src="{{ img.url }}" alt="{{ img.alt_text }}" loading="lazy">
            </div>
            <div class="img-label">{{ img.alt_text }}</div>
        </div>
        {% endfor %}
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Noor E Mahal &nbsp;<span class="heart">♥</span>&nbsp; All Rights Reserved</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- 1. Gallery Filter ---
            const filterBtns = document.querySelectorAll('.filter-btn');
            const galleryItems = document.querySelectorAll('.gallery-item');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const cat = btn.dataset.cat;

                    galleryItems.forEach(item => {
                        // Reset tilt transforms before hiding to prevent layout bugs
                        item.style.transform = 'none';

                        if (cat === 'all' || item.dataset.category === cat) {
                            item.removeAttribute('data-hidden');
                        } else {
                            item.setAttribute('data-hidden', 'true');
                        }
                    });
                });
            });

            // --- 2. Hero Slider ---
            const slides = document.querySelectorAll('.slide');
            const dots = document.querySelectorAll('.slider-dot');
            let currentSlide = 0;
            let slideInterval;

            const goToSlide = (index) => {
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = index;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
            };

            const nextSlide = () => {
                let next = (currentSlide + 1) % slides.length;
                goToSlide(next);
            };

            dots.forEach((dot, index) => {
                dot.addEventListener('click', () => {
                    clearInterval(slideInterval);
                    goToSlide(index);
                    slideInterval = setInterval(nextSlide, 5000);
                });
            });

            slideInterval = setInterval(nextSlide, 5000);

            // --- 3. Parallax Effect on scroll ---
            window.addEventListener('scroll', () => {
                const scrolled = window.scrollY;
                const parallaxBgs = document.querySelectorAll('.parallax-bg');
                const parallaxText = document.querySelector('.parallax-text');

                // Move backgrounds down slightly
                parallaxBgs.forEach(bg => {
                    bg.style.transform = `translateY(${scrolled * 0.4}px)`;
                });
                // Move text down a bit faster for depth
                if (parallaxText) {
                    parallaxText.style.transform = `translateY(${scrolled * 0.6}px)`;
                    parallaxText.style.opacity = 1 - (scrolled / 500);
                }
            });

            // --- 4. JS 3D Hover Tilt Effect (Premium feel) ---
            const tiltCards = document.querySelectorAll('.tilt-card');

            tiltCards.forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    // Only apply 3D tilt on desktop
                    if (window.innerWidth <= 768) return;

                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left; // x position within the element.
                    const y = e.clientY - rect.top; // y position within the element.

                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;

                    const rotateX = ((y - centerY) / centerY) * -10; // Max rotation 10deg
                    const rotateY = ((x - centerX) / centerX) * 10;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    card.style.zIndex = 10;
                    card.style.transition = 'transform 0.1s ease-out';
                });

                card.addEventListener('mouseleave', () => {
                    if (window.innerWidth <= 768) return;
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    card.style.zIndex = 1;
                    card.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), z-index 0s 0.6s';
                });
            });
        });
    </script>
</body>

</html>
